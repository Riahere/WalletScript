name: walletscript
description: Smart Personal Finance Manager
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.1.0
  fl_chart: ^0.68.0
  flutter_slidable: ^3.1.0
  intl: ^0.19.0
  sqflite: ^2.3.2
  path: ^1.9.0
  http: ^1.2.0
  provider: ^6.1.2
  table_calendar: ^3.1.2
  cupertino_icons: ^1.0.6
  image_picker: ^0.8.9
  url_launcher: ^6.2.5
  webview_flutter: ^4.4.0
  file_picker: ^8.1.6
  shared_preferences: ^2.2.0
  connectivity_plus: ^6.0.0
  path_provider: ^2.1.2
  permission_handler: ^11.3.1

  # Auth
  supabase_flutter: ^2.3.0
  google_sign_in: ^6.2.0

  # Export / Share
  share_plus: ^10.0.0  # kept the newer version

  # Notifications
  flutter_local_notifications: ^17.2.2  # kept one copy
  firebase_core: ^3.3.0
  firebase_messaging: ^15.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png